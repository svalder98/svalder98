# Copia este archivo a .github/workflows/notify-profile.yml en cada repo tuyo
# Requiere secret PROFILE_TRIGGER con acceso write a svalder98/svalder98

name: Notify Profile Stack Update

on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger profile stack update
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PROFILE_TRIGGER }}" \
            https://api.github.com/repos/svalder98/svalder98/dispatches \
            -d '{"event_type":"stack-update"}'
